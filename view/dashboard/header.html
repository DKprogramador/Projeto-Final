<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>header</title>
    <link rel="st" href="header.css">


</head>

<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'BatmanForever', sans-serif;
}

@font-face {
    font-family: 'BatmanForever';
    src: url('/view/fonts/batman_forever/batmfa__.ttf') format('truetype');
}

body{
    background-color: #000000;
    color: white;
}


/* Estilização do Cabeçalho */
header {
    background-color: #060606;
    color: #fff;
    padding: 1rem;
    top: 0;
    left: 0;
    z-index: 1000;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: fixed;
    width: 100%;
    border: 8px 9px 9px solid #ff9800;
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    background: #060606;
}

.nav-list {
    list-style: none;
    display: flex;
}

.nav-list li {
    margin: 0 15px;
}

.nav-list a {
    text-decoration: none;
    color: white;
    font-size: 14px;
    transition: 0.3s;
}

.nav-list a:hover {
    color: #ff9800;
}

/* Menu Mobile */
.menu-toggle {
    display: none;
    flex-direction: column;
    cursor: pointer;
}

.bar {
    background: white;
    height: 4px;
    width: 30px;
    margin: 5px 0;
}

@media (max-width: 940px) {
    .menu-toggle {
        display: flex;
    }

    header {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        
    }

    .nav-list {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 60px;
        left: 0;
        background: #333;
        width: 100%;
        text-align: center;
    }

    .nav-list.active {
        display: flex;
        transition: all 0.3s ease in out;
        margin-top: 30px;
    }

    .nav-list li {
        padding: 15px 0;
    }
    @media (max-width: 640px){
        header {
            flex-direction: column;
        }
    }
}

</style>

<body>
    <header>
        <h1>Dashboard - Indústrias Wayne</h1>
        <nav class="navbar">
            <div class="menu-toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
            <ul class="nav-list">
                <li><a href="../../dashboard/dashboard.html">Start</a></li>
                <li><a href="/view/in-resources/vehicles/veichels.html">Veichels</a></li>
                <li><a href="/view/in-resources/s-devices/sdevices.html">Security Devices</a></li>
                <li><a href="/view/in-resources/e-inventory/einventory.html">Equipament Inventory</a></li>
            </ul>
        </nav>
    </header>

    <script> const menuToggle = document.getElementById('mobile-menu');
        const navList = document.querySelector('.nav-list');
        
        menuToggle.addEventListener('click', () => {
            navList.classList.toggle('active');
        }); </script>
</body>
</html>
